name: Render e-ink display

on:
  schedule:
    # GitHub Actions can delay scheduled runs (commonly ~2h, worse at :00).
    # Fire 2h early and off the hour to land closer to the intended local time.
    - cron: '37 2  * * *'   # targets ~05:00 local — morning
    - cron: '37 9  * * *'   # targets ~12:00 local — midday
    - cron: '37 14 * * *'   # targets ~17:00 local — afternoon
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install system libraries for node-canvas
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev

      - name: Install dependencies
        run: npm ci

      - name: Render display image
        run: node render.js

      - name: Commit and push output
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/display.png
          if git diff --cached --quiet; then
            echo "Nothing to commit — image unchanged."
          else
            git commit -m "chore: update display render [skip ci]"
            git push
          fi
